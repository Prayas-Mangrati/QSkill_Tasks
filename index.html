<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="/public/razorpay_logo_icon.png"
    />
    <title>Razorpay - Best Payment Solution for Online Payments India</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <section class="navbar">
      <div class="nav-div">
        <img class="logo" src="/public/razorpay_logo.png" alt="Razorpay Logo" />
        <div class="nav-links">
          <a class="nav-link" href="#">Agentic Stack</a>
          <a class="nav-link" href="#">Payments</a>
          <a class="nav-link" href="#">Banking+</a>
          <a class="nav-link" href="#">Payroll</a>
          <a class="nav-link" href="#">Engage</a>
          <a class="nav-link" href="#">Partners</a>
          <a class="nav-link" href="#">Resources</a>
          <a class="nav-link" href="#">Pricing</a>
        </div>
        <div class="nav-end">
          <i class="fa-solid fa-headphones fa-xl" style="color: blue"></i>
          <div class="custom-select-container">
                <div class="select-trigger" onclick="toggleDropdown()" style="display: flex; justify-content: center; align-items: center; cursor: pointer;">
                    <img id="selected-flag" src="/public/ind.png" width="28" alt="India Flag" />
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                
                <ul class="select-options" id="options-list">
                <li onclick="selectCountry('Malasia', '/public/Malaysia.svg')">
                    <img src="/public/Malaysia.svg" width="20" alt="Malasia Flag" /> Malasia
                </li>
                <li onclick="selectCountry('Singapore', '/public/Singapore.png')">
                    <img src="/public/singapore.png" width="20" alt="Singapore Flag" /> Singapore
                </li>
                <li onclick="selectCountry('United States', '/public/us.avif')">
                    <img src="/public/us.avif" width="20" alt="United States Flag" /> United States
                </li>
                </ul>
          </div>
          <a><div class="login-btn">Login</div></a>
          <a
            ><div class="login-btn signup-btn">
              <p>Sign Up</p>
              <i
                class="fa-solid fa-arrow-right"
                style="color: white; margin-left: 3px"
              ></i></div
          ></a>
        </div>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
